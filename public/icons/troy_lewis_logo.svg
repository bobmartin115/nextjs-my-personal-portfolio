<svg width="600" height="220" viewBox="0 0 600 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A3FF"/>
      <stop offset="100%" stop-color="#0047FF"/>
    </linearGradient>

    <linearGradient id="orangeGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#FFC400"/>
    </linearGradient>

    <filter id="glowBlue">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowOrange">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="600" height="220" rx="24" fill="#111827"/>

  <!-- T -->
  <g filter="url(#glowBlue)">
    <path d="M90 60H220L210 90H165L145 170H110L130 90H80L90 60Z"
      fill="url(#blueGradient)"/>
  </g>

  <!-- L -->
  <g filter="url(#glowOrange)">
    <path d="M245 60H285L260 145H330L320 170H210L245 60Z"
      fill="url(#orangeGradient)"/>
  </g>

  <!-- Dot -->
  <circle cx="350" cy="158" r="8" fill="#FF9F00"/>

  <!-- Name -->
  <text x="380" y="120"
    font-family="Arial, Helvetica, sans-serif"
    font-size="44"
    font-weight="700"
    fill="url(#blueGradient)">
    TROY
  </text>

  <text x="380" y="165"
    font-family="Arial, Helvetica, sans-serif"
    font-size="44"
    font-weight="700"
    fill="url(#orangeGradient)">
    LEWIS
  </text>
</svg>
